<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>每日小红书面料文案</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fdf8f3;
      --card: #fffbf7;
      --accent: #c45c3e;
      --accent-soft: #e8a090;
      --text: #2c2c2c;
      --text-soft: #5c5c5c;
      --border: #ecd9d0;
      --shadow: rgba(196, 92, 62, 0.08);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.65;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }
    header {
      text-align: center;
      padding: 28px 0 20px;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-family: "Noto Serif SC", serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }
    .subtitle {
      font-size: 0.85rem;
      color: var(--text-soft);
      margin-top: 6px;
    }
    .day-badge {
      display: inline-block;
      margin-top: 12px;
      padding: 6px 12px;
      background: var(--accent-soft);
      color: #fff;
      font-size: 0.8rem;
      border-radius: 20px;
    }
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 22px 20px;
      margin-top: 22px;
      box-shadow: 0 4px 20px var(--shadow);
      border: 1px solid var(--border);
    }
    .card h2 {
      font-family: "Noto Serif SC", serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .post-image-wrap {
      width: 100%;
      margin-bottom: 18px;
      border-radius: 12px;
      overflow: hidden;
      background: #f5f0eb;
      aspect-ratio: 4/3;
      position: relative;
    }
    .post-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .post-image-actions {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 12px;
      background: linear-gradient(transparent, rgba(0,0,0,0.5));
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .post-image-actions .btn {
      padding: 8px 14px;
      font-size: 0.85rem;
      background: rgba(255,255,255,0.95);
      color: var(--text);
      text-decoration: none;
    }
    .post-image-actions .btn:hover {
      background: #fff;
    }
    .post-image-hint {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.95);
    }
    .fabric-tag {
      font-size: 0.85rem;
      color: var(--accent);
      margin-bottom: 18px;
    }
    .point {
      margin-bottom: 20px;
    }
    .point:last-child {
      margin-bottom: 0;
    }
    .point-title {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      font-size: 0.95rem;
    }
    .point-content {
      font-size: 0.9rem;
      color: var(--text-soft);
    }
    .tags {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px dashed var(--border);
      font-size: 0.8rem;
      color: var(--text-soft);
      word-break: break-all;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .btn {
      font-family: "Noto Sans SC", sans-serif;
      font-size: 0.9rem;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 10px var(--shadow);
    }
    .btn-primary:hover {
      box-shadow: 0 4px 16px rgba(196, 92, 62, 0.25);
    }
    .btn-secondary {
      background: var(--card);
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      opacity: 0;
      transition: transform 0.25s, opacity 0.25s;
      z-index: 100;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .preview {
      margin-top: 16px;
      padding: 14px;
      background: #f5f0eb;
      border-radius: 10px;
      font-size: 0.8rem;
      color: var(--text-soft);
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
    }
    .nav-hint {
      text-align: center;
      margin-top: 24px;
      font-size: 0.85rem;
      color: var(--text-soft);
    }
    .nav-hint button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      font-size: inherit;
    }
    .site-title-bar {
      background: var(--accent);
      color: #fff;
      text-align: center;
      padding: 10px 16px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="site-title-bar">FONCIN 凤城辅助系统</div>
  <div class="container">
    <header>
      <h1>每日小红书面料文案</h1>
      <p class="subtitle">每天一条 · 面料触感 · 怎么挑 · 成分怎么看 · 怎么做成的</p>
      <p class="subtitle" style="margin-top: 10px;">
        <a href="index.html" style="color: var(--accent); text-decoration: underline; margin-right: 12px;">每日文案页</a>
        <a href="preference.html" style="color: var(--accent); text-decoration: underline; margin-right: 12px;">客户喜好推荐</a>
        <a href="admin.html" style="color: var(--accent); text-decoration: underline;">管理后台（多设备编辑）</a>
      </p>
      <span class="day-badge" id="dayBadge">今日文案</span>
    </header>

    <div class="card" id="contentCard">
      <div class="post-image-wrap" id="postImageWrap">
        <img id="postImage" src="" alt="" />
        <div class="post-image-actions">
          <span class="post-image-hint">📷 今日配图（发小红书用）</span>
          <a class="btn" id="downloadImageBtn" href="#" target="_blank" rel="noopener">💾 保存配图</a>
        </div>
      </div>
      <h2 id="postTitle"></h2>
      <p class="fabric-tag" id="fabricTag"></p>
      <div id="pointsContainer"></div>
      <div class="tags" id="tagsEl"></div>
      <div class="actions">
        <button class="btn btn-primary" id="copyBtn">📋 一键复制文案</button>
        <button class="btn btn-secondary" id="togglePreview">预览全文</button>
      </div>
      <div class="preview" id="previewBox" style="display: none;"></div>
    </div>

    <p class="nav-hint">
      <button type="button" id="prevDay">← 昨天</button>
      &nbsp; · &nbsp;
      <button type="button" id="nextDay">明天 →</button>
    </p>

    <div class="card" id="inspirationCard">
      <h2 style="margin-bottom: 6px;">今日灵感</h2>
      <p class="subtitle" style="text-align:left; margin-top:0;">结合天气/节日，给你推荐今天写什么角度</p>
      <div class="preview" id="inspirationBox" style="margin-top: 14px;">加载中…</div>
      <div class="actions" style="margin-top: 14px;">
        <button class="btn btn-primary" id="copyInspirationBtn">📋 复制灵感</button>
        <button class="btn btn-secondary" id="refreshInspirationBtn">刷新</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">已复制到剪贴板</div>

  <!-- 1) 云端：Supabase SDK + 配置 + 云端加载 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="cloud.js"></script>
  <script src="inspiration.js"></script>

  <!-- 2) 本地 fallback：data.js（无 config.js 时仍可用） -->
  <script src="data.js"></script>
  <script src="logic.js"></script>
  <script>
    let currentOffset = 0; // 0 = 今天，-1 = 昨天，+1 = 明天

    function getPostByOffset() {
      if (!Array.isArray(window.FABRIC_POSTS) || window.FABRIC_POSTS.length === 0) return null;
      const dayIndex = getDayIndex() + currentOffset;
      const index = ((dayIndex % window.FABRIC_POSTS.length) + window.FABRIC_POSTS.length) % window.FABRIC_POSTS.length;
      return window.FABRIC_POSTS[index];
    }

    function renderPost(post) {
      if (!post) {
        document.getElementById("postTitle").textContent = "暂无文案";
        document.getElementById("fabricTag").textContent = "请先在管理后台添加文案，或配置云端连接。";
        document.getElementById("pointsContainer").innerHTML = "";
        document.getElementById("tagsEl").textContent = "";
        document.getElementById("previewBox").textContent = "";
        document.getElementById("postImageWrap").style.display = "none";
        return;
      }
      const img = document.getElementById("postImage");
      const wrap = document.getElementById("postImageWrap");
      const downloadBtn = document.getElementById("downloadImageBtn");
      if (post.imageUrl) {
        wrap.style.display = "block";
        img.src = post.imageUrl;
        img.alt = post.imageAlt || post.fabric;
        downloadBtn.href = post.imageUrl;
        downloadBtn.download = "今日配图.jpg";
        downloadBtn.style.display = "inline-block";
      } else {
        wrap.style.display = "none";
        downloadBtn.style.display = "none";
      }
      document.getElementById("postTitle").textContent = post.title;
      document.getElementById("fabricTag").textContent = "📌 " + post.fabric;
      const container = document.getElementById("pointsContainer");
      container.innerHTML = post.points.map(p =>
        `<div class="point">
          <div class="point-title">${p.emoji} ${p.title}</div>
          <div class="point-content">${p.content}</div>
        </div>`
      ).join("");
      document.getElementById("tagsEl").textContent = post.tags.join(" ");
      document.getElementById("previewBox").textContent = formatForXiaohongshu(post);
    }

    function updateDayBadge() {
      const badge = document.getElementById("dayBadge");
      if (currentOffset === 0) badge.textContent = "今日文案";
      else if (currentOffset === -1) badge.textContent = "昨天文案";
      else if (currentOffset === 1) badge.textContent = "明天文案";
      else badge.textContent = (currentOffset > 0 ? "+" : "") + currentOffset + " 天";
    }

    function showToast() {
      const t = document.getElementById("toast");
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2000);
    }

    document.getElementById("copyBtn").onclick = function () {
      const post = getPostByOffset();
      const text = formatForXiaohongshu(post);
      navigator.clipboard.writeText(text).then(showToast).catch(() => {
        document.getElementById("toast").textContent = "请手动复制";
        showToast();
      });
    };

    document.getElementById("togglePreview").onclick = function () {
      const box = document.getElementById("previewBox");
      const show = box.style.display === "none";
      box.style.display = show ? "block" : "none";
      this.textContent = show ? "收起预览" : "预览全文";
    };

    document.getElementById("prevDay").onclick = function () {
      currentOffset--;
      renderPost(getPostByOffset());
      updateDayBadge();
    };
    document.getElementById("nextDay").onclick = function () {
      currentOffset++;
      renderPost(getPostByOffset());
      updateDayBadge();
    };

    async function initInspiration() {
      const box = document.getElementById("inspirationBox");
      try {
        const info = await window.__inspiration.loadDailyInspiration();
        box.textContent = info.text;
      } catch (e) {
        box.textContent = "灵感加载失败（网络或接口异常）。你仍然可以正常使用每日文案。";
        console.warn(e);
      }
    }

    document.getElementById("copyInspirationBtn").onclick = function () {
      const text = document.getElementById("inspirationBox").textContent || "";
      navigator.clipboard.writeText(text).then(showToast).catch(() => {
        document.getElementById("toast").textContent = "请手动复制";
        showToast();
      });
    };
    document.getElementById("refreshInspirationBtn").onclick = function () {
      initInspiration();
    };

    async function initApp() {
      // 先从云端拉取（配置了 Supabase 时），失败则回退本地 data.js
      const posts = await window.__cloud.loadPostsPreferCloud();
      window.FABRIC_POSTS = posts;

      renderPost(getPostByOffset());
      updateDayBadge();
      initInspiration();
    }

    // 初始加载
    initApp();
  </script>
</body>
</html>
