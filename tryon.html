<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>布料试穿 · NANO BANANA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8f4f0;
      --card: #fffcf9;
      --accent: #c45c3e;
      --accent-soft: #e8a090;
      --text: #2c2c2c;
      --text-soft: #5c5c5c;
      --border: #e0d5ce;
      --shadow: rgba(196, 92, 62, 0.1);
      --upload-bg: #f5f0eb;
      --success: #4a7c59;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    .site-title-bar {
      background: var(--accent);
      color: #fff;
      text-align: center;
      padding: 10px 16px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .site-title-bar a {
      color: #fff;
      text-decoration: none;
      margin-left: 12px;
      font-weight: 400;
      font-size: 0.9rem;
      opacity: 0.95;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }
    header {
      text-align: center;
      padding: 20px 0 24px;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-family: "Noto Serif SC", serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
    }
    .subtitle {
      font-size: 0.9rem;
      color: var(--text-soft);
      margin-top: 8px;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      margin-top: 20px;
      box-shadow: 0 4px 24px var(--shadow);
      border: 1px solid var(--border);
    }
    .card h2 {
      font-family: "Noto Serif SC", serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 14px;
    }
    .upload-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    @media (max-width: 560px) {
      .upload-grid { grid-template-columns: 1fr; }
    }
    .upload-zone {
      background: var(--upload-bg);
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 20px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent-soft);
      background: #fdf8f5;
    }
    .upload-zone.has-image {
      border-style: solid;
      padding: 8px;
    }
    .upload-zone .placeholder {
      text-align: center;
      color: var(--text-soft);
      font-size: 0.9rem;
    }
    .upload-zone .placeholder .icon {
      font-size: 2rem;
      display: block;
      margin-bottom: 8px;
      opacity: 0.8;
    }
    .upload-zone img {
      max-width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: 8px;
    }
    .upload-zone .label {
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 6px;
      font-size: 0.95rem;
    }
    .btn {
      font-family: "Noto Sans SC", sans-serif;
      font-size: 0.95rem;
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px var(--shadow);
      width: 100%;
      margin-top: 8px;
    }
    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 4px 20px rgba(196, 92, 62, 0.3);
    }
    .btn-secondary {
      background: var(--card);
      color: var(--accent);
      border: 1px solid var(--accent);
      font-size: 0.85rem;
      padding: 8px 14px;
    }
    .result-section {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px dashed var(--border);
    }
    .result-section h2 { margin-bottom: 12px; }
    .result-placeholder {
      background: var(--upload-bg);
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 48px 24px;
      text-align: center;
      color: var(--text-soft);
      font-size: 0.9rem;
    }
    .result-image-wrap {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      background: #f0ebe6;
      margin-bottom: 12px;
    }
    .result-image-wrap img {
      width: 100%;
      display: block;
      vertical-align: top;
    }
    .result-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: #fff;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 0.9rem;
      opacity: 0;
      transition: transform 0.25s, opacity 0.25s;
      z-index: 100;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast.error { background: #b54a4a; }
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint {
      font-size: 0.8rem;
      color: var(--text-soft);
      margin-top: 16px;
      padding: 12px;
      background: #faf8f6;
      border-radius: 10px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="site-title-bar">
    FONCIN 凤城辅助系统
    <a href="index.html">每日文案</a>
    <a href="tryon.html">布料试穿</a>
    <a href="preference.html">客户喜好</a>
    <a href="admin.html">管理后台</a>
  </div>
  <div class="container">
    <header>
      <h1>布料试穿 · NANO BANANA</h1>
      <p class="subtitle">上传一张布料 + 一张模特图，AI 将布料做成衣服穿在模特身上</p>
    </header>

    <div class="card">
      <h2>1. 上传图片</h2>
      <div class="upload-grid">
        <div class="upload-zone" id="zoneFabric" data-role="fabric">
          <span class="label">布料图</span>
          <span class="placeholder">
            <span class="icon">🧵</span>
            点击或拖拽上传布料/面料图
          </span>
          <img id="previewFabric" alt="" style="display: none;" />
        </div>
        <div class="upload-zone" id="zoneModel" data-role="model">
          <span class="label">模特图</span>
          <span class="placeholder">
            <span class="icon">👤</span>
            点击或拖拽上传模特/人物全身照
          </span>
          <img id="previewModel" alt="" style="display: none;" />
        </div>
      </div>

      <h2>2. 生成试穿图</h2>
      <button type="button" class="btn btn-primary" id="btnGenerate" disabled>
        生成试穿效果
      </button>
      <p class="hint">
        使用 NANO BANANA（Gemini 图像模型）将布料纹理与颜色合成到模特身上，保持人物姿势与背景。建议：布料图清晰、模特全身正面、光线均匀效果更佳。
      </p>

      <div class="result-section">
        <h2>3. 生成结果</h2>
        <div id="resultPlaceholder" class="result-placeholder">
          上传布料与模特图后点击「生成试穿效果」，约 10–20 秒内出图。
        </div>
        <div id="resultWrap" style="display: none;">
          <div class="result-image-wrap">
            <img id="resultImage" src="" alt="试穿效果" />
          </div>
          <div class="result-actions">
            <a id="downloadResult" class="btn btn-secondary" href="#" download="tryon-result.png">💾 保存图片</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">已保存</div>

  <script>
    (function () {
      const zoneFabric = document.getElementById("zoneFabric");
      const zoneModel = document.getElementById("zoneModel");
      const previewFabric = document.getElementById("previewFabric");
      const previewModel = document.getElementById("previewModel");
      const btnGenerate = document.getElementById("btnGenerate");
      const resultPlaceholder = document.getElementById("resultPlaceholder");
      const resultWrap = document.getElementById("resultWrap");
      const resultImage = document.getElementById("resultImage");
      const downloadResult = document.getElementById("downloadResult");
      const toast = document.getElementById("toast");

      let fabricData = null; // { base64, mimeType }
      let modelData = null;

      function readFile(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve({ base64: reader.result.split(",")[1], mimeType: file.type || "image/jpeg" });
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function setImage(role, data, previewEl, zoneEl) {
        if (role === "fabric") fabricData = data;
        else modelData = data;
        if (data) {
          previewEl.src = "data:" + (data.mimeType || "image/jpeg") + ";base64," + data.base64;
          previewEl.style.display = "block";
          zoneEl.querySelector(".placeholder").style.display = "none";
          zoneEl.classList.add("has-image");
        } else {
          previewEl.src = "";
          previewEl.style.display = "none";
          zoneEl.querySelector(".placeholder").style.display = "";
          zoneEl.classList.remove("has-image");
        }
        updateGenerateButton();
      }

      function handleDrop(zone, role, previewEl, dataSetter) {
        return function (e) {
          e.preventDefault();
          zone.classList.remove("dragover");
          const file = (e.dataTransfer && e.dataTransfer.files[0]) || null;
          if (!file || !file.type.startsWith("image/")) return;
          readFile(file).then(function (data) {
            setImage(role, data, previewEl, zone);
          });
        };
      }

      zoneFabric.addEventListener("click", function () {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        input.onchange = function () {
          const file = input.files && input.files[0];
          if (!file) return;
          readFile(file).then(function (data) {
            setImage("fabric", data, previewFabric, zoneFabric);
          });
        };
        input.click();
      });
      zoneModel.addEventListener("click", function () {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        input.onchange = function () {
          const file = input.files && input.files[0];
          if (!file) return;
          readFile(file).then(function (data) {
            setImage("model", data, previewModel, zoneModel);
          });
        };
        input.click();
      });

      zoneFabric.addEventListener("dragover", function (e) { e.preventDefault(); zoneFabric.classList.add("dragover"); });
      zoneFabric.addEventListener("dragleave", function () { zoneFabric.classList.remove("dragover"); });
      zoneFabric.addEventListener("drop", handleDrop(zoneFabric, "fabric", previewFabric));
      zoneModel.addEventListener("dragover", function (e) { e.preventDefault(); zoneModel.classList.add("dragover"); });
      zoneModel.addEventListener("dragleave", function () { zoneModel.classList.remove("dragover"); });
      zoneModel.addEventListener("drop", handleDrop(zoneModel, "model", previewModel));

      function updateGenerateButton() {
        btnGenerate.disabled = !(fabricData && modelData);
      }

      function showToast(msg, isError) {
        toast.textContent = msg;
        toast.classList.toggle("error", !!isError);
        toast.classList.add("show");
        setTimeout(function () { toast.classList.remove("show"); }, 3200);
      }

      btnGenerate.addEventListener("click", async function () {
        if (!fabricData || !modelData) return;
        btnGenerate.disabled = true;
        resultPlaceholder.innerHTML = '<div class="spinner"></div>正在生成试穿效果，请稍候…';
        resultPlaceholder.style.display = "block";
        resultWrap.style.display = "none";

        try {
          const res = await fetch("/api/tryon", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              fabric: { data: fabricData.base64, mimeType: fabricData.mimeType },
              model: { data: modelData.base64, mimeType: modelData.mimeType }
            })
          });
          const json = await res.json();
          if (!res.ok) {
            throw new Error(json.error || "生成失败");
          }
          if (json.imageBase64) {
            const dataUrl = "data:" + (json.mimeType || "image/png") + ";base64," + json.imageBase64;
            resultImage.src = dataUrl;
            downloadResult.href = dataUrl;
            downloadResult.download = "tryon-result.png";
            resultPlaceholder.style.display = "none";
            resultWrap.style.display = "block";
            showToast("生成成功，可保存图片");
          } else {
            throw new Error(json.message || "未返回图片");
          }
        } catch (e) {
          resultPlaceholder.innerHTML = "生成失败：" + (e.message || String(e));
          resultPlaceholder.style.display = "block";
          resultWrap.style.display = "none";
          showToast(e.message || "生成失败", true);
        } finally {
          btnGenerate.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
