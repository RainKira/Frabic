<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录 - FONCIN 凤城辅助系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fdf8f3;
      --card: #fffbf7;
      --accent: #c45c3e;
      --accent-soft: #e8a090;
      --text: #2c2c2c;
      --text-soft: #5c5c5c;
      --border: #ecd9d0;
      --shadow: rgba(196, 92, 62, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .site-title-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--accent);
      color: #fff;
      text-align: center;
      padding: 10px 16px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .login-wrap {
      width: 100%;
      max-width: 360px;
      background: var(--card);
      border-radius: 14px;
      padding: 28px 24px;
      box-shadow: 0 4px 20px var(--shadow);
      border: 1px solid var(--border);
      margin-top: 60px;
    }
    .login-wrap h1 {
      font-family: "Noto Serif SC", serif;
      font-size: 1.25rem;
      color: var(--accent);
      text-align: center;
      margin-bottom: 20px;
    }
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .tabs button {
      flex: 1;
      padding: 10px;
      border: none;
      background: none;
      font-size: 0.95rem;
      color: var(--text-soft);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tabs button.active {
      color: var(--accent);
      font-weight: 600;
      border-bottom-color: var(--accent);
    }
    .panel { display: none; }
    .panel.active { display: block; }
    .field {
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-soft);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 1rem;
      outline: none;
    }
    .field input:focus {
      border-color: var(--accent-soft);
      box-shadow: 0 0 0 2px rgba(196,92,62,0.12);
    }
    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 10px var(--shadow);
    }
    .btn-primary:hover { box-shadow: 0 4px 14px rgba(196,92,62,0.24); }
    .switch-hint {
      text-align: center;
      margin-top: 16px;
      font-size: 0.85rem;
      color: var(--text-soft);
    }
    .switch-hint a {
      color: var(--accent);
      text-decoration: underline;
      cursor: pointer;
    }
    .msg {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      display: none;
    }
    .msg.show { display: block; }
    .msg.error { background: #fde8e8; color: #8a2e22; }
    .msg.success { background: #e8f5e9; color: #2e7d32; }
    .no-config {
      text-align: center;
      padding: 20px;
      color: var(--text-soft);
      font-size: 0.9rem;
    }
    .no-config a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="site-title-bar">FONCIN 凤城辅助系统</div>

  <div class="login-wrap" id="loginWrap">
    <h1>内部系统 · 请登录</h1>

    <div class="tabs">
      <button type="button" id="tabLogin" class="active">登录</button>
      <button type="button" id="tabRegister">注册</button>
    </div>

    <div id="panelLogin" class="panel active">
      <form id="formLogin">
        <div class="field">
          <label>邮箱</label>
          <input type="email" id="loginEmail" required placeholder="your@email.com" autocomplete="email" />
        </div>
        <div class="field">
          <label>密码</label>
          <input type="password" id="loginPassword" required placeholder="请输入密码" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">登录</button>
      </form>
      <div id="loginMsg" class="msg" role="alert"></div>
      <p class="switch-hint">没有账号？<a id="goRegister">去注册</a></p>
    </div>

    <div id="panelRegister" class="panel">
      <form id="formRegister">
        <div class="field">
          <label>邮箱</label>
          <input type="email" id="regEmail" required placeholder="your@email.com" autocomplete="email" />
        </div>
        <div class="field">
          <label>密码（至少 6 位）</label>
          <input type="password" id="regPassword" required minlength="6" placeholder="至少 6 位" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary" id="regBtn">注册</button>
      </form>
      <div id="regMsg" class="msg" role="alert"></div>
      <p class="switch-hint">已有账号？<a id="goLogin">去登录</a></p>
    </div>
  </div>

  <div class="login-wrap no-config" id="noConfigWrap" style="display: none;">
    <p>尚未配置 Supabase，无法使用登录功能。</p>
    <p>请先复制 <code>config.example.js</code> 为 <code>config.js</code> 并填入 Supabase 的 URL 与 Key。</p>
    <p style="margin-top: 12px;"><a href="index.html">仅访问公开页（不校验登录）</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="cloud.js"></script>
  <script>
    (function() {
      const cfg = window.__cloud?.getAppConfig?.() || {};
      const hasCfg = window.__cloud?.hasSupabaseConfig?.(cfg);

      if (!hasCfg) {
        document.getElementById("loginWrap").style.display = "none";
        document.getElementById("noConfigWrap").style.display = "block";
        return;
      }

      const client = window.__cloud.createSupabaseClient(cfg);

      function getRedirect() {
        const params = new URLSearchParams(window.location.search);
        const r = params.get("redirect");
        if (r && r.startsWith("/")) return r;
        if (r) return r;
        return "index.html";
      }

      function showMsg(panel, type, text) {
        const id = panel === "login" ? "loginMsg" : "regMsg";
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = text;
        el.className = "msg show " + type;
        el.setAttribute("aria-live", "polite");
      }
      function hideMsg(panel) {
        const id = panel === "login" ? "loginMsg" : "regMsg";
        const el = document.getElementById(id);
        if (el) { el.textContent = ""; el.className = "msg"; }
      }
      function setLoading(panel, loading) {
        const btn = document.getElementById(panel === "login" ? "loginBtn" : "regBtn");
        if (!btn) return;
        btn.disabled = loading;
        btn.textContent = loading ? (panel === "login" ? "登录中…" : "注册中…") : (panel === "login" ? "登录" : "注册");
      }

      // 处理「邮件里的确认链接」：点开后会跳回本站并带 #access_token=...
      if (window.location.hash && (window.location.hash.indexOf("access_token") !== -1 || window.location.hash.indexOf("error") !== -1)) {
        const msgEl = document.getElementById("loginMsg");
        if (msgEl) {
          msgEl.className = "msg show success";
          msgEl.textContent = "正在验证邮箱…";
        }
        client.auth.getSession().then(function(res) {
          if (res.data?.session) {
            if (msgEl) msgEl.textContent = "邮箱验证成功，正在跳转…";
            window.location.replace(getRedirect());
          } else {
            var err = "";
            try {
              var params = new URLSearchParams(window.location.hash.substring(1));
              err = params.get("error_description") || params.get("error") || "验证失败";
            } catch (e) { err = "验证失败"; }
            if (msgEl) {
              msgEl.className = "msg show error";
              msgEl.textContent = err;
            }
            history.replaceState(null, "", window.location.pathname + window.location.search);
          }
        }).catch(function(e) {
          if (msgEl) {
            msgEl.className = "msg show error";
            msgEl.textContent = "验证时出错，请重试或直接在此页用密码登录。";
          }
          history.replaceState(null, "", window.location.pathname + window.location.search);
        });
        return; // 本次只处理回调，不绑定表单
      }

      // 已登录则直接跳转
      client.auth.getSession().then(function(res) {
        if (res.data?.session) {
          window.location.replace(getRedirect());
        }
      });

      document.getElementById("tabLogin").onclick = function() {
        document.getElementById("tabLogin").classList.add("active");
        document.getElementById("tabRegister").classList.remove("active");
        document.getElementById("panelLogin").classList.add("active");
        document.getElementById("panelRegister").classList.remove("active");
        hideMsg("login");
        hideMsg("register");
      };
      document.getElementById("tabRegister").onclick = function() {
        document.getElementById("tabRegister").classList.add("active");
        document.getElementById("tabLogin").classList.remove("active");
        document.getElementById("panelRegister").classList.add("active");
        document.getElementById("panelLogin").classList.remove("active");
        hideMsg("login");
        hideMsg("register");
      };
      document.getElementById("goRegister").onclick = function() { document.getElementById("tabRegister").click(); };
      document.getElementById("goLogin").onclick = function() { document.getElementById("tabLogin").click(); };

      document.getElementById("formLogin").onsubmit = async function(e) {
        e.preventDefault();
        hideMsg("login");
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;
        if (!email || !password) {
          showMsg("login", "error", "请填写邮箱和密码。");
          return;
        }
        setLoading("login", true);
        try {
          const { data, error } = await client.auth.signInWithPassword({ email, password });
          if (error) throw error;
          showMsg("login", "success", "登录成功，正在跳转…");
          window.location.replace(getRedirect());
          return;
        } catch (err) {
          console.warn("登录失败", err);
          var msg = err && err.message ? String(err.message) : "登录失败，请检查邮箱和密码。";
          if (msg.indexOf("Email not confirmed") !== -1 || msg.indexOf("email_not_confirmed") !== -1) {
            msg = "该邮箱尚未验证。请查收邮件并点击验证链接后再登录。若未收到邮件，可在 Supabase 后台关闭「邮箱验证」后重试。";
          } else if (msg.indexOf("Invalid login") !== -1 || msg.indexOf("invalid") !== -1) {
            msg = "邮箱或密码错误，请重试。";
          }
          showMsg("login", "error", msg);
        } finally {
          setLoading("login", false);
        }
      };

      document.getElementById("formRegister").onsubmit = async function(e) {
        e.preventDefault();
        hideMsg("register");
        const email = document.getElementById("regEmail").value.trim();
        const password = document.getElementById("regPassword").value;
        if (!email || !password) {
          showMsg("register", "error", "请填写邮箱和密码（至少 6 位）。");
          return;
        }
        setLoading("register", true);
        try {
          const { data, error } = await client.auth.signUp({ email, password });
          if (error) throw error;
          if (data?.user && data.user.identities && data.user.identities.length === 0) {
            showMsg("register", "error", "该邮箱已被注册，请直接登录或换一个邮箱。");
            return;
          }
          showMsg("register", "success", "注册成功！请到「登录」标签用刚填的邮箱和密码登录。若无法登录，请到 Supabase 后台关闭「Confirm email」后重试。");
        } catch (err) {
          console.warn("注册失败", err);
          showMsg("register", "error", (err && err.message) ? String(err.message) : "注册失败，请稍后重试。");
        } finally {
          setLoading("register", false);
        }
      };
    })();
  </script>
</body>
</html>
